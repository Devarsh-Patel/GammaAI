name: gammaai_app
description: "GammaAI - agentic AI search, Flutter frontend built with MVVM architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0          # Service layer: talks to the FastAPI backend
  provider: ^6.1.2      # ViewModel layer: ChangeNotifier + state binding
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
